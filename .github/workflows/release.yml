name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - label: Linux x64
            bun-target: bun-linux-x64
            suffix: linux-x64

          - label: macOS arm64
            bun-target: bun-darwin-arm64
            suffix: darwin-arm64

          - label: Windows x64
            bun-target: bun-windows-x64
            suffix: windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun build --compile --target=${{ matrix.bun-target }} --outfile=wg-to-ws-${{ matrix.suffix }} src/index.ts
      - run: bun build --compile --target=${{ matrix.bun-target }} --outfile=wg-to-ws-server-${{ matrix.suffix }} src/server.ts
      - run: bun build --compile --target=${{ matrix.bun-target }} --outfile=wg-to-ws-client-${{ matrix.suffix }} src/client.ts

      - uses: actions/upload-artifact@v4
        with:
          name: wg-to-ws-${{ matrix.suffix }}
          path: |
            wg-to-ws-${{ matrix.suffix }}
            wg-to-ws-server-${{ matrix.suffix }}
            wg-to-ws-client-${{ matrix.suffix }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: wg-to-ws ${{ github.event.inputs.tag || github.ref_name }}
          body: |
            ## wg-to-ws ${{ github.ref_name }}

            Download the binary for your platform below.

            | File | Platform |
            |------|----------|
            | `wg-to-ws-linux-x64` | Linux x86-64 (combined — `./wg-to-ws server\|client`) |
            | `wg-to-ws-server-linux-x64` | Linux x86-64 (server only) |
            | `wg-to-ws-client-linux-x64` | Linux x86-64 (client only) |
            | `wg-to-ws-darwin-arm64` | macOS Apple Silicon (combined) |
            | `wg-to-ws-server-darwin-arm64` | macOS Apple Silicon (server only) |
            | `wg-to-ws-client-darwin-arm64` | macOS Apple Silicon (client only) |
            | `wg-to-ws-windows-x64.exe` | Windows x86-64 (combined) |
            | `wg-to-ws-server-windows-x64.exe` | Windows x86-64 (server only) |
            | `wg-to-ws-client-windows-x64.exe` | Windows x86-64 (client only) |

            ### Usage

            ```bash
            # Run via combined binary:
            ./wg-to-ws-linux-x64 server
            ./wg-to-ws-linux-x64 client

            # Or use the standalone variants:
            WG_MODE=server ./wg-to-ws-server-linux-x64
            WG_MODE=client ./wg-to-ws-client-linux-x64
            ```

            See the README for full configuration via environment variables.
          files: artifacts/*
          generate_release_notes: false

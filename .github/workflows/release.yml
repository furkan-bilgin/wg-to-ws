name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - label: Linux x64
            bun-target: bun-linux-x64
            asset: wg-to-ws-linux-x64

          - label: macOS arm64
            bun-target: bun-darwin-arm64
            asset: wg-to-ws-darwin-arm64

          - label: Windows x64
            bun-target: bun-windows-x64
            asset: wg-to-ws-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun build --compile --target=${{ matrix.bun-target }} --outfile=${{ matrix.asset }} src/index.ts

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: wg-to-ws ${{ github.event.inputs.tag || github.ref_name }}
          body: |
            ## wg-to-ws ${{ github.event.inputs.tag || github.ref_name }}

            Download the binary for your platform below.

            | File | Platform |
            |------|----------|
            | `wg-to-ws-linux-x64` | Linux x86-64 |
            | `wg-to-ws-darwin-arm64` | macOS Apple Silicon |
            | `wg-to-ws-windows-x64.exe` | Windows x86-64 |

            ### Usage

            ```bash
            # Run as server
            ./wg-to-ws-linux-x64 server --bind 0.0.0.0:443 --base-path /wg

            # Run as client
            ./wg-to-ws-linux-x64 client --listen 127.0.0.1:51820 --ws-url wss://vps.example.com/wg
            ```

            See the README for all CLI options and environment variables.
          files: artifacts/*
          generate_release_notes: false

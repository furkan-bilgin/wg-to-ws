name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - label: Linux x64
            bun-target: bun-linux-x64
            asset: wg-to-ws-linux-x64

          - label: macOS arm64
            bun-target: bun-darwin-arm64
            asset: wg-to-ws-darwin-arm64

          - label: Windows x64
            bun-target: bun-windows-x64
            asset: wg-to-ws-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.8

      - run: bun build --compile --target=${{ matrix.bun-target }} --outfile=${{ matrix.asset }} --define WG_VERSION=${{ github.ref_name }} src/index.ts

      # M4: Generate SHA-256 checksum for this binary
      - run: sha256sum ${{ matrix.asset }} > ${{ matrix.asset }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256

  release:
    name: Create Release
    needs: build
    # Only create a GitHub Release on tag pushes or manual dispatch
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR artifacts/

      # Generate a combined checksums.txt from individual .sha256 files
      - name: Generate combined checksums.txt
        run: |
          cat artifacts/*.sha256 2>/dev/null | sort > artifacts/checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: wg-to-ws ${{ github.event.inputs.tag || github.ref_name }}
          body: |
            ## wg-to-ws ${{ github.event.inputs.tag || github.ref_name }}

            Download the binary for your platform below.

            | File | Platform |
            |------|----------|
            | `wg-to-ws-linux-x64` | Linux x86-64 |
            | `wg-to-ws-darwin-arm64` | macOS Apple Silicon |
            | `wg-to-ws-windows-x64.exe` | Windows x86-64 |

            ### Usage

            ```bash
            # Run as server
            ./wg-to-ws-linux-x64 server --bind 127.0.0.1:8080 --base-path /wg

            # Run as client
            ./wg-to-ws-linux-x64 client --listen 127.0.0.1:51820 --ws-url wss://vps.example.com/wg
            ```

            ### Verify integrity

            Download `checksums.txt` and verify with:

            ```bash
            sha256sum -c checksums.txt --ignore-missing
            ```

            See the README for all CLI options and environment variables.
          files: artifacts/*
          generate_release_notes: false
